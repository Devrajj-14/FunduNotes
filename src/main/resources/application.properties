# ============================================================
# Fundoo Notes - Application Configuration
# ============================================================

# Server
server.port=8080

# ============================================================
# MySQL Datasource
# Override with environment variables or application-local.properties
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/fundoo_notes
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# JWT Configuration
# Override secret in production via environment variable
# ============================================================
app.jwt.secret=${JWT_SECRET:OverrideThisWithASecureSecretInProduction}
app.jwt.expiration=${JWT_EXPIRATION:3600000}

# ============================================================
# Logging
# ============================================================
logging.level.root=INFO
logging.level.com.fundoonotes=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
